name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Full Release APK
        run: ./gradlew assembleFullRelease

      - name: Build Store Release APK
        run: ./gradlew assembleStoreRelease

      - name: Upload Full APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Zenith-Full-Release
          path: app/build/outputs/apk/full/release/*.apk
          retention-days: 30

      - name: Upload Store APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Zenith-Store-Release
          path: app/build/outputs/apk/store/release/*.apk
          retention-days: 30
